appId: com.nexus.ai
productName: 奈克瑟 NEXUS
directories:
  output: electron-dist
  buildResources: public

files:
  # 前端构建产物
  - dist/**/*
  # Electron 主进程
  - electron/**/*.mjs
  # 服务端 bundle
  - server-bundle/**/*

extraResources:
  # 服务端必需的原生 node_modules
  - from: ../server/node_modules
    to: node_modules
    filter:
      - "@lancedb/**"
      - "apache-arrow/**"
      - "bcryptjs/**"
      - "ioredis/**"
      - "mysql2/**"
      - "ffmpeg-static/**"
      - "@xenova/**"
      # MCP 不打包（Electron 不需要 npx 启动子进程）
      # langchain 走 esbuild bundle

npmRebuild: false
asar: true
compression: maximum

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-Setup.${ext}
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg

linux:
  target:
    - AppImage
